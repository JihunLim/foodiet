<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:var(--cream-00);display:flex;gap:18px;align-items:flex-end;flex-wrap:wrap;}
  .u{display:flex;flex-direction:column;align-items:center;gap:6px;}
  .box{background:var(--coral-200);border-radius:6px;width:40px;}
  .lbl{font-size:11px;color:var(--fg-2);font-family:var(--font-mono);}
  .sp-1{height:4px;} .sp-2{height:8px;} .sp-3{height:12px;} .sp-4{height:16px;}
  .sp-5{height:20px;} .sp-6{height:24px;} .sp-8{height:32px;} .sp-10{height:40px;}
  .sp-12{height:48px;} .sp-16{height:64px;}
</style></head>
<body>
  <div class="u"><div class="box sp-1"></div><div class="lbl">1·4</div></div>
  <div class="u"><div class="box sp-2"></div><div class="lbl">2·8</div></div>
  <div class="u"><div class="box sp-3"></div><div class="lbl">3·12</div></div>
  <div class="u"><div class="box sp-4"></div><div class="lbl">4·16</div></div>
  <div class="u"><div class="box sp-5"></div><div class="lbl">5·20</div></div>
  <div class="u"><div class="box sp-6"></div><div class="lbl">6·24</div></div>
  <div class="u"><div class="box sp-8"></div><div class="lbl">8·32</div></div>
  <div class="u"><div class="box sp-10"></div><div class="lbl">10·40</div></div>
  <div class="u"><div class="box sp-12"></div><div class="lbl">12·48</div></div>
  <div class="u"><div class="box sp-16"></div><div class="lbl">16·64</div></div>
</body></html>
