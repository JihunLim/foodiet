<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--cream-00);}
  .big{font-family:var(--font-display);font-size:64px;font-weight:700;letter-spacing:-0.03em;line-height:1;color:var(--fg);}
  .num{font-family:var(--font-display);font-weight:700;font-feature-settings:'tnum' 1;letter-spacing:-0.03em;}
  .grid{display:grid;grid-template-columns:auto 1fr;gap:8px 28px;align-items:baseline;}
  .k{font-size:11px;color:var(--fg-muted);text-transform:uppercase;letter-spacing:0.06em;}
  .v{font-size:15px;color:var(--fg-1);}
  .unit{font-size:18px;color:var(--fg-2);font-weight:500;margin-left:4px;}
</style></head>
<body>
<div style="display:flex;gap:32px;align-items:flex-start;">
  <div>
    <div class="big"><span class="num">1,280</span><span class="unit">kcal</span></div>
    <div style="color:var(--fg-2);font-size:13px;margin-top:6px;">목표 1,500 kcal · 85%</div>
  </div>
  <div class="grid" style="padding-top:6px;">
    <div class="k">탄수화물</div><div class="v"><span class="num">168</span>g</div>
    <div class="k">단백질</div><div class="v"><span class="num">72</span>g</div>
    <div class="k">지방</div><div class="v"><span class="num">38</span>g</div>
    <div class="k">현재</div><div class="v"><span class="num" style="color:var(--coral-500);">62.4</span> kg</div>
    <div class="k">목표</div><div class="v"><span class="num" style="color:var(--leaf-500);">58.0</span> kg</div>
  </div>
</div>
</body></html>
