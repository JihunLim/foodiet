<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:var(--cream-00);}
  .row{display:flex;gap:10px;flex-wrap:wrap;}
  .g{width:168px;height:110px;border-radius:14px;display:flex;flex-direction:column;justify-content:flex-end;padding:12px;box-sizing:border-box;color:#3E3A31;}
  .name{font-size:12px;font-weight:700;}
  .var{font-size:10px;font-family:var(--font-mono);opacity:0.7;}
</style></head>
<body>
<div class="row">
  <div class="g" style="background:var(--grad-spring);"><div class="name">Spring</div><div class="var">--grad-spring</div></div>
  <div class="g" style="background:var(--grad-sunrise);color:#fff;"><div class="name">Sunrise</div><div class="var">--grad-sunrise</div></div>
  <div class="g" style="background:var(--grad-sprout);color:#fff;"><div class="name">Sprout</div><div class="var">--grad-sprout</div></div>
  <div class="g" style="background:var(--grad-peach);"><div class="name">Peach</div><div class="var">--grad-peach</div></div>
  <div class="g" style="background:var(--grad-bloom);"><div class="name">Bloom</div><div class="var">--grad-bloom</div></div>
</div>
</body></html>
