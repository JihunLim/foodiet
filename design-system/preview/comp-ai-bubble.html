<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:var(--cream-00);display:flex;gap:14px;flex-wrap:wrap;}
  .card{width:260px;background:var(--cream-50);border:1px solid rgba(62,58,49,0.05);border-radius:18px;padding:14px;box-shadow:var(--shadow-sm);}
  .bubble{display:flex;gap:10px;align-items:flex-start;}
  .avatar{width:36px;height:36px;border-radius:999px;background:var(--grad-peach);flex-shrink:0;display:flex;align-items:center;justify-content:center;}
  .msg{background:var(--cream-00);border-radius:14px;border-top-left-radius:4px;padding:10px 12px;font-size:13px;color:var(--fg-1);line-height:1.45;}
  .tag{font-size:11px;font-weight:700;color:var(--coral-600);margin-bottom:4px;letter-spacing:0.02em;}
</style></head>
<body>
  <div class="card">
    <div class="bubble">
      <div class="avatar"><img src="../assets/mascot-foodie.svg" width="28"/></div>
      <div class="msg"><div class="tag">푸디의 한마디</div>오늘 단백질이 조금 부족해 보여! 저녁엔 두부나 닭가슴살 어때?</div>
    </div>
  </div>
  <div class="card" style="background:var(--coral-50);border-color:var(--coral-100);">
    <div class="bubble">
      <div class="avatar" style="background:#FFE4D1;"><img src="../assets/mascot-foodie.svg" width="28"/></div>
      <div class="msg" style="background:#fff;"><div class="tag">AI 추천</div>냉장고 속 재료로 <b>봄나물 비빔밥</b> 만들어볼래?<br>📸 사진 분석 완료</div>
    </div>
  </div>
</body></html>
