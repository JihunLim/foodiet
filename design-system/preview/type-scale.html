<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:var(--cream-00);}
  .wrap{display:flex;flex-direction:column;gap:10px;}
  .row{display:flex;gap:10px;align-items:baseline;}
  .sample{font-family:var(--font-display);color:var(--fg);line-height:1;letter-spacing:var(--ls-tight);}
  .label{font-size:11px;color:var(--fg-muted);font-weight:500;min-width:120px;letter-spacing:0.04em;text-transform:uppercase;}
  .meta{font-size:11px;color:var(--fg-muted);font-family:var(--font-mono);}
</style></head>
<body>
<div class="wrap">
  <div class="row"><div class="label">Display · 42/700</div><div class="sample" style="font-size:42px;font-weight:700;">오늘 뭐 먹었어?</div></div>
  <div class="row"><div class="label">H1 · 34/700</div><div class="sample" style="font-size:34px;font-weight:700;">봄나물 비빔밥</div></div>
  <div class="row"><div class="label">H2 · 28/700</div><div class="sample" style="font-size:28px;font-weight:700;">오늘의 식단</div></div>
  <div class="row"><div class="label">H3 · 24/700</div><div class="sample" style="font-size:24px;font-weight:700;color:var(--fg-1);">아침 · 8:30</div></div>
  <div class="row"><div class="label">Title · 18/500</div><div class="sample" style="font-size:18px;font-weight:500;color:var(--fg-1);">딸기 요거트볼</div></div>
  <div class="row"><div class="label">Body · 16/500</div><div class="sample" style="font-size:16px;font-weight:500;color:var(--fg-1);">사진을 올리면 자동으로 분석해줄게</div></div>
  <div class="row"><div class="label">Body-sm · 13/500</div><div class="sample" style="font-size:13px;color:var(--fg-2);">권장 섭취량 대비 82%</div></div>
  <div class="row"><div class="label">Caption · 12/500</div><div class="sample" style="font-size:12px;color:var(--fg-muted);letter-spacing:0.02em;">AM 08:30 · 아침</div></div>
</div>
</body></html>
