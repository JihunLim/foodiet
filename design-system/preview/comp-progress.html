<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:var(--cream-00);display:flex;flex-direction:column;gap:18px;}
  .wrap{max-width:480px;}
  .label{display:flex;justify-content:space-between;font-size:13px;font-weight:700;color:var(--fg-1);margin-bottom:8px;}
  .num{font-family:var(--font-display);color:var(--coral-500);}
  .bar{height:12px;border-radius:999px;background:var(--warm-200);position:relative;overflow:hidden;}
  .fill{position:absolute;inset:0;right:15%;border-radius:999px;background:var(--grad-sunrise);}
  .ring{width:110px;height:110px;}
  .row{display:flex;align-items:center;gap:18px;}
  .ring-num{font-family:var(--font-display);font-weight:700;font-size:28px;color:var(--coral-500);line-height:1;}
  .ring-unit{font-size:12px;color:var(--fg-muted);}
</style></head>
<body>
  <div class="wrap">
    <div class="label"><span>오늘의 칼로리</span><span><span class="num">1,280</span> / 1,500 kcal</span></div>
    <div class="bar"><div class="fill"></div></div>
  </div>
  <div class="row">
    <svg class="ring" viewBox="0 0 110 110">
      <circle cx="55" cy="55" r="46" fill="none" stroke="#E6DDCF" stroke-width="10"/>
      <circle cx="55" cy="55" r="46" fill="none" stroke="#FF8A5B" stroke-width="10" stroke-linecap="round"
              stroke-dasharray="289" stroke-dashoffset="58" transform="rotate(-90 55 55)"/>
    </svg>
    <div>
      <div class="ring-num">85%</div>
      <div class="ring-unit">목표 달성률</div>
    </div>
  </div>
</body></html>
