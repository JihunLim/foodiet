<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:var(--cream-00);}
  .row{display:flex;gap:10px;flex-wrap:wrap;}
  .sw{width:112px;height:112px;border-radius:14px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;box-sizing:border-box;}
  .name{font-size:12px;font-weight:700;}
  .hex{font-size:10px;font-family:var(--font-mono);opacity:0.75;margin-top:2px;}
</style></head>
<body>
<div class="row">
  <div class="sw" style="background:#F2F9EC;color:#457A44;"><div class="name">leaf-50</div><div class="hex">#F2F9EC</div></div>
  <div class="sw" style="background:#E0F1CE;color:#457A44;"><div class="name">leaf-100</div><div class="hex">#E0F1CE</div></div>
  <div class="sw" style="background:#A9D582;color:#3E3A31;"><div class="name">leaf-300</div><div class="hex">#A9D582</div></div>
  <div class="sw" style="background:#7FB77E;color:#fff;box-shadow:var(--shadow-leaf);"><div class="name">leaf-500 ★</div><div class="hex">#7FB77E</div></div>
  <div class="sw" style="background:#5E9C5C;color:#fff;"><div class="name">leaf-600</div><div class="hex">#5E9C5C</div></div>
  <div class="sw" style="background:#457A44;color:#fff;"><div class="name">leaf-700</div><div class="hex">#457A44</div></div>
</div>
</body></html>
