<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:var(--cream-00);display:flex;gap:14px;flex-wrap:wrap;}
  .card{background:var(--cream-50);border-radius:18px;padding:16px;width:220px;box-shadow:var(--shadow-sm);border:1px solid rgba(62,58,49,0.04);}
  .meal-img{height:100px;border-radius:12px;background:var(--grad-peach);display:flex;align-items:center;justify-content:center;}
  .meal-title{font-size:16px;font-weight:700;color:var(--fg-1);margin-top:10px;letter-spacing:-0.01em;}
  .meal-kcal{font-size:13px;color:var(--fg-2);margin-top:4px;}
  .kcal-num{font-family:var(--font-display);font-weight:700;color:var(--coral-500);font-feature-settings:'tnum' 1;}
  .chip{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:999px;font-size:11px;font-weight:700;background:#FFE4D1;color:#C9582F;margin-top:8px;}
</style></head>
<body>
  <div class="card">
    <div class="meal-img"><img src="../assets/illust-salad.svg" width="80"/></div>
    <div class="chip">점심 · 12:40</div>
    <div class="meal-title">봄나물 샐러드</div>
    <div class="meal-kcal"><span class="kcal-num">320</span> kcal · 단백질 18g</div>
  </div>
  <div class="card">
    <div class="meal-img" style="background:var(--grad-bloom);"><img src="../assets/illust-strawberry.svg" width="60"/></div>
    <div class="chip" style="background:#E0F1CE;color:#457A44;">간식 · 15:20</div>
    <div class="meal-title">딸기 요거트볼</div>
    <div class="meal-kcal"><span class="kcal-num">180</span> kcal · 단백질 8g</div>
  </div>
</body></html>
