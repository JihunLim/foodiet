<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:var(--cream-00);display:flex;gap:14px;align-items:center;flex-wrap:wrap;}
  .logo{display:flex;align-items:center;gap:10px;}
  .wordmark{font-family:'Gmarket Sans',sans-serif;font-weight:700;font-size:26px;color:var(--fg);letter-spacing:-0.02em;}
  .accent{color:var(--coral-500);}
  .tile{background:var(--grad-peach);padding:18px;border-radius:18px;display:flex;align-items:center;gap:12px;}
</style></head>
<body>
  <div class="tile">
    <img src="../assets/logo-mark.svg" width="48"/>
    <div class="wordmark">foo<span class="accent">diet</span></div>
  </div>
  <div class="tile" style="background:var(--coral-500);">
    <img src="../assets/logo-mark.svg" width="44" style="filter:drop-shadow(0 1px 2px rgba(0,0,0,0.1));"/>
    <div class="wordmark" style="color:#fff;">foodiet</div>
  </div>
  <div class="tile" style="background:var(--leaf-100);">
    <img src="../assets/logo-mark.svg" width="40"/>
    <div class="wordmark" style="font-size:22px;color:var(--leaf-700);">foodiet</div>
  </div>
</body></html>
