<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:18px;background:var(--grad-peach);display:flex;gap:16px;align-items:flex-end;}
  .tabbar{width:340px;background:#fff;border-radius:24px;padding:10px;display:flex;justify-content:space-around;box-shadow:var(--shadow-md);}
  .tab{display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 10px;border-radius:16px;color:var(--fg-muted);font-size:11px;font-weight:700;}
  .tab.active{background:var(--coral-50);color:var(--coral-600);}
  .icon{width:22px;height:22px;}
  .fab{width:60px;height:60px;border-radius:999px;background:var(--coral-500);color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-coral);font-size:28px;margin-top:-30px;}
</style></head>
<body>
  <div class="tabbar">
    <div class="tab active">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12 12 4l9 8v8a2 2 0 0 1-2 2h-4v-6h-6v6H5a2 2 0 0 1-2-2z"/></svg>
      홈
    </div>
    <div class="tab">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M8 10h8M8 14h5"/></svg>
      기록
    </div>
    <div class="fab">＋</div>
    <div class="tab">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 17l5-5 4 4 8-8"/><path d="M15 8h6v6"/></svg>
      추세
    </div>
    <div class="tab">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c1-4 4.5-6 8-6s7 2 8 6"/></svg>
      나
    </div>
  </div>
</body></html>
