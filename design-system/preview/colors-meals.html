<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:var(--cream-00);}
  .row{display:flex;gap:10px;flex-wrap:wrap;}
  .chip{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:14px;min-width:180px;}
  .dot{width:28px;height:28px;border-radius:10px;flex-shrink:0;box-shadow:inset 0 0 0 1px rgba(0,0,0,0.05);}
  .lbl{font-size:13px;font-weight:700;color:var(--fg);}
  .mt{font-size:11px;color:var(--fg-muted);font-family:var(--font-mono);}
</style></head>
<body>
<div class="row">
  <div class="chip" style="background:#FFF0D6;"><div class="dot" style="background:#F7D36A;"></div><div><div class="lbl">아침 Breakfast</div><div class="mt">#F7D36A · 버터</div></div></div>
  <div class="chip" style="background:#FFE4D1;"><div class="dot" style="background:#FF8A5B;"></div><div><div class="lbl">점심 Lunch</div><div class="mt">#FF8A5B · 코랄</div></div></div>
  <div class="chip" style="background:#EDE5F5;"><div class="dot" style="background:#8B6FB3;"></div><div><div class="lbl">저녁 Dinner</div><div class="mt">#8B6FB3 · 라벤더</div></div></div>
  <div class="chip" style="background:#E0F1CE;"><div class="dot" style="background:#7FB77E;"></div><div><div class="lbl">간식 Snack</div><div class="mt">#7FB77E · 그린</div></div></div>
</div>
</body></html>
