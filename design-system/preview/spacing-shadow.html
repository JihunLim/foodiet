<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:28px;background:var(--cream-00);display:flex;gap:24px;flex-wrap:wrap;align-items:center;}
  .b{width:120px;height:90px;background:#fff;border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;}
  .n{font-size:12px;font-weight:700;color:var(--fg-1);}
  .v{font-size:10px;font-family:var(--font-mono);color:var(--fg-muted);}
</style></head>
<body>
  <div class="b" style="box-shadow:var(--shadow-xs);"><div class="n">xs</div><div class="v">hover</div></div>
  <div class="b" style="box-shadow:var(--shadow-sm);"><div class="n">sm</div><div class="v">card</div></div>
  <div class="b" style="box-shadow:var(--shadow-md);"><div class="n">md</div><div class="v">elevated</div></div>
  <div class="b" style="box-shadow:var(--shadow-lg);"><div class="n">lg</div><div class="v">modal</div></div>
  <div class="b" style="box-shadow:var(--shadow-coral);background:var(--coral-500);color:#fff;"><div class="n" style="color:#fff;">coral</div><div class="v" style="color:rgba(255,255,255,0.85);">CTA</div></div>
</body></html>
