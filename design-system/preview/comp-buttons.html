<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--cream-00);display:flex;gap:12px;flex-wrap:wrap;align-items:center;}
  .btn{font-family:var(--font-sans);font-weight:700;font-size:15px;border:none;cursor:pointer;padding:14px 22px;border-radius:14px;letter-spacing:-0.01em;transition:all .15s ease;}
  .primary{background:var(--coral-500);color:#fff;box-shadow:var(--shadow-coral);}
  .primary:hover{background:var(--coral-600);}
  .secondary{background:var(--leaf-100);color:var(--leaf-700);}
  .ghost{background:transparent;color:var(--fg-1);border:1.5px solid var(--border);}
  .pill{background:var(--coral-500);color:#fff;border-radius:999px;padding:12px 24px;box-shadow:var(--shadow-coral);}
  .icon{background:var(--coral-500);color:#fff;width:56px;height:56px;border-radius:999px;display:inline-flex;align-items:center;justify-content:center;box-shadow:var(--shadow-coral);font-size:28px;}
</style></head>
<body>
  <button class="btn primary">오늘 식단 기록</button>
  <button class="btn secondary">나중에</button>
  <button class="btn ghost">취소</button>
  <button class="btn pill">＋ 사진 추가</button>
  <button class="icon">＋</button>
</body></html>
