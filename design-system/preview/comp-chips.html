<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px;background:var(--cream-00);display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
  .chip{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:999px;font-size:13px;font-weight:700;letter-spacing:-0.01em;}
  .dot{width:8px;height:8px;border-radius:50%;}
  .break{background:#FFF0D6;color:#A67A1F;}
  .lunch{background:#FFE4D1;color:#C9582F;}
  .dinner{background:#EDE5F5;color:#5E4A85;}
  .snack{background:#E0F1CE;color:#457A44;}
  .success{background:#E0F1CE;color:#457A44;}
  .warn{background:#FFF0D6;color:#B27B11;}
  .new{background:#FFE4D1;color:#C9582F;}
</style></head>
<body>
  <span class="chip break"><span class="dot" style="background:#F7D36A;"></span>아침</span>
  <span class="chip lunch"><span class="dot" style="background:#FF8A5B;"></span>점심</span>
  <span class="chip dinner"><span class="dot" style="background:#8B6FB3;"></span>저녁</span>
  <span class="chip snack"><span class="dot" style="background:#7FB77E;"></span>간식</span>
  <span class="chip success">✓ 목표 달성</span>
  <span class="chip warn">칼로리 주의</span>
  <span class="chip new">NEW 봄 레시피</span>
</body></html>
