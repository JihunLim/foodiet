<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:var(--cream-00);}
  .row{display:flex;gap:10px;flex-wrap:wrap;}
  .sw{width:112px;height:112px;border-radius:14px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;box-sizing:border-box;border:1px solid rgba(62,58,49,0.06);}
  .name{font-size:12px;font-weight:700;}
  .hex{font-size:10px;font-family:var(--font-mono);opacity:0.75;margin-top:2px;}
</style></head>
<body>
<div class="row">
  <div class="sw" style="background:#FFFDFA;color:#3E3A31;"><div class="name">cream-00</div><div class="hex">#FFFDFA</div></div>
  <div class="sw" style="background:#FBF6EF;color:#3E3A31;"><div class="name">cream-50</div><div class="hex">#FBF6EF</div></div>
  <div class="sw" style="background:#F4EDE2;color:#3E3A31;"><div class="name">cream-100</div><div class="hex">#F4EDE2</div></div>
  <div class="sw" style="background:#E6DDCF;color:#3E3A31;"><div class="name">warm-200</div><div class="hex">#E6DDCF</div></div>
  <div class="sw" style="background:#958B7A;color:#fff;"><div class="name">warm-400</div><div class="hex">#958B7A</div></div>
  <div class="sw" style="background:#6B6454;color:#fff;"><div class="name">warm-500</div><div class="hex">#6B6454</div></div>
  <div class="sw" style="background:#3E3A31;color:#FBF6EF;"><div class="name">warm-700</div><div class="hex">#3E3A31</div></div>
  <div class="sw" style="background:#221F1A;color:#FBF6EF;"><div class="name">warm-900</div><div class="hex">#221F1A</div></div>
</div>
</body></html>
