<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px;background:var(--cream-00);}
  .row{display:flex;gap:10px;flex-wrap:wrap;}
  .sw{width:112px;height:112px;border-radius:14px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;box-sizing:border-box;}
  .name{font-size:12px;font-weight:700;}
  .hex{font-size:10px;font-family:var(--font-mono);opacity:0.75;margin-top:2px;letter-spacing:0;}
</style></head>
<body>
<div class="row">
  <div class="sw" style="background:#FFF4EC;color:#C9582F;"><div class="name">coral-50</div><div class="hex">#FFF4EC</div></div>
  <div class="sw" style="background:#FFE4D1;color:#C9582F;"><div class="name">coral-100</div><div class="hex">#FFE4D1</div></div>
  <div class="sw" style="background:#FFB38A;color:#fff;"><div class="name">coral-300</div><div class="hex">#FFB38A</div></div>
  <div class="sw" style="background:#FF8A5B;color:#fff;box-shadow:var(--shadow-coral);"><div class="name">coral-500 ★</div><div class="hex">#FF8A5B</div></div>
  <div class="sw" style="background:#EE7042;color:#fff;"><div class="name">coral-600</div><div class="hex">#EE7042</div></div>
  <div class="sw" style="background:#C9582F;color:#fff;"><div class="name">coral-700</div><div class="hex">#C9582F</div></div>
</div>
</body></html>
